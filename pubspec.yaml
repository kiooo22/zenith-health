name: mentalhealth
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0

  # Firebase dependencies
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  firebase_storage: ^12.0.0

  # UI & utilitas (opsional)
  provider: ^6.1.2
  google_fonts: ^6.2.1
  fl_chart: ^0.66.0
  image_picker: ^1.1.2
  showcaseview: ^3.0.0

  # Gemini AI
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^5.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/icon.png
    - assets/images/splash.png
    - assets/images/2.png
    - assets/images/3.png
    - assets/images/4.png
    - assets/images/5.png
    - assets/images/6.png
    - assets/images/7.png
